<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: Arial, sans-serif; width: 320px; padding: 10px; }
      button { width: 100%; margin: 6px 0; padding: 8px; }
      .btn-secondary { background: #f5f5f5; border: 1px solid #ddd; }
      .btn-success { background: #28a745; color: white; border: none; }
      input, textarea { width: 100%; box-sizing: border-box; margin-top: 4px; }
      .muted { color: #666; font-size: 12px; }
      .info { font-size: 11px; color: #888; margin-top: 8px; }
    </style>
  </head>
  <body>
    <h3>Feishu Scroll OCR</h3>
    <label>OCR.Space API Key (optional)</label>
    <input id="apiKey" placeholder="helloworld or your key" />
    <button id="save">Save Settings</button>
    <hr style="border:0;border-top:1px solid #eee;margin:10px 0;">
    <button id="pick">1) Select Region</button>
    <button id="run">2) Capture + Extract</button>
    <hr style="border:0;border-top:1px solid #eee;margin:10px 0;">
    <button id="copy" class="btn-secondary">📋 Copy to Clipboard</button>
    <button id="download" class="btn-secondary">💾 Download .txt</button>
    <div class="info" id="info">No extraction yet</div>
    <div class="muted" id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
